# Copy to config.yaml and fill in secrets

supabase:
  url: "https://YOUR_PROJECT.supabase.co"
  service_role_key: "YOUR_SERVICE_ROLE_KEY"
  # Bucket for downloaded listing images when scraping.download_images is true (default: listing-images). Create a public bucket with this name in Supabase Dashboard → Storage.
  # storage_bucket: "listing-images"

scraping:
  httpx_delay_seconds: 1.5
  playwright_delay_seconds: 4
  max_pages_classifieds: 10
  max_pages_auctions: 50   # Full scrape (scheduler / CLI). Use 1 for quick test.
  # When run is triggered via POST /api/run (Odśwież oferty): cap pages and total listings. Daily/cron scrape is unaffected.
  # Omit to use max_pages_auctions for API runs too (may not finish on Railway).
  on_demand_max_pages_auctions: 10
  # Total listings to scrape on demand (default 20). First scraper gets up to this many; second gets remainder, etc.
  on_demand_max_listings: 20
  # Optional: only keep listings with auction_date in the last N days; stops pagination when older. Omit for full scrape.
  # days_back: 1
  # Active sources: komornik, e_licytacje, amw (Facebook via webhook). Omit or [] to run all.
  sources: ["komornik", "e_licytacje", "amw"]
  # Region filter removed: scrapers fetch all regions; filter by region (e.g. mazowieckie) in the app. See docs/FILTERS.md.
  # When price is missing (e.g. Facebook post), follow first "offer" link in text and try to extract price from that page. Set false to disable.
  follow_link_for_price: true
  # If set, only follow links to these domains (e.g. ["arcabinvestments.com", "otodom.pl"]). Omit to allow any domain except social networks.
  # follow_link_domains: ["arcabinvestments.com"]
  # For komornik, e_licytacje, amw: archive listings with auction_date older than this many months (default 2). See docs/ARCHIVE_RULES_PLAN.md.
  # archive_older_than_months: 2
  # Download listing images to Supabase Storage and replace listing.images with Storage URLs. Requires bucket "listing-images" (public). Default false.
  # download_images: false
  # Max images to download per listing (default 5).
  # download_images_max_per_listing: 5
  # Timeout in seconds per image GET (default 15).
  # download_images_timeout_seconds: 15

# Investment score (0–100) per listing. See docs/SCORING_HUNTER.md.
# scoring:
#   weights:
#     price_anomaly: 0.35   # spread do mediany ceny za m²
#     yield: 0.25           # yield brutto (czynsz/cena)
#     location: 0.25       # atrakcyjność regionu
#     risk: 0.15           # ryzyko źródła (odejmowane)
#   risk_by_source:
#     komornik: 0.7
#     e_licytacje: 0.5
#     amw: 0.4
#     facebook: 0.4
#   location_score_by_region: {}   # np. mazowieckie: 0.9, małopolskie: 0.8; brak = 0.5
#   default_median_price_m2: 8000   # PLN/m² gdy brak mediany z ofert

# Apify (Facebook): token do pobierania datasetów; webhook_secret do weryfikacji POST /webhook/apify
apify:
  token: "YOUR_APIFY_TOKEN"
  webhook_secret: ""

# On-demand run (POST /api/run, e.g. navbar refresh). If set, require header X-Run-Secret. If unset, apify.webhook_secret is used.
# run_api:
#   secret: "YOUR_RUN_SECRET"

logging:
  level: "INFO"
  rotation: "10 MB"
  retention: "7 days"

scheduler:
  enabled: true
  # Updates once per day at 13:30 CET (Europe/Warsaw)
  cron: "30 13 * * *"
  timezone: "Europe/Warsaw"
